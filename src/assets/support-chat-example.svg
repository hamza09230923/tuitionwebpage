<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450" role="img" aria-label="Example 24/7 support chat between a student and a tutor">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="800" height="450" rx="24" fill="url(#bg)"/>
  <rect x="40" y="40" width="720" height="370" rx="18" fill="#ffffff" filter="url(#shadow)"/>

  <rect x="60" y="60" width="680" height="46" rx="12" fill="#0b3d91"/>
  <text x="90" y="90" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#ffffff" font-weight="600">
    24/7 Support Chat (Example)
  </text>

  <rect x="80" y="140" width="500" height="78" rx="14" fill="#e2e8f0"/>
  <text x="100" y="170" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#0f172a">
    Student: I am stuck on expanding (x + 4)(x - 7). What do I do?
  </text>

  <rect x="220" y="240" width="500" height="110" rx="14" fill="#dbeafe"/>
  <text x="240" y="270" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#0b3d91">
    Tutor: Multiply each term in the first bracket by each term
  </text>
  <text x="240" y="292" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#0b3d91">
    in the second: x*x = x^2, x*-7 = -7x,
  </text>
  <text x="240" y="314" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#0b3d91">
    4*x = 4x, 4*-7 = -28. Combine like terms:
  </text>
  <text x="240" y="336" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#0b3d91" font-weight="600">
    x^2 - 3x - 28. Tip: write a quick grid to avoid missing terms.
  </text>
</svg>
